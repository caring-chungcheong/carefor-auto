name: 상담 공지 (신규상담 미입력 + 대기명단)

# 발송 보장 구조 (2026-07-08):
#   1차(정시): cron-job.org 외부 workflow_dispatch — 매일 07:00 KST 호출 (GitHub cron 지연 우회)
#   2차(백업): schedule cron — 아침 예약분. GitHub 스케줄러가 수 시간 지연될 수 있어 백업 용도.
#   gate: 오늘(KST) 이미 성공 발송이 있으면 스킵 → 외부/예약/수동이 겹쳐도 중복 발송 없음.
# 수동 실행: dry_run=true(미리보기) / force=true(무조건 발송) / report(both|consult|waitlist)
# 주의: 발송 전 시간대에 dry_run 성공 이력이 있으면 gate가 발송된 것으로 오인할 수 있으니
#       오전에는 dry_run을 돌리지 말 것.

# 동시 실행 방지: 외부 dispatch·예약·수동이 겹쳐도 순차 실행 → 뒤쪽은 gate에서 스킵
concurrency:
  group: consult-report
  cancel-in-progress: false

permissions:
  contents: write   # 본부 공유 요약페이지(docs/consult_summary.html) 커밋용

on:
  schedule:
    - cron: '2 22 * * *'   # 매일 KST 07:02 (UTC 22:02) — GitHub 지연 대비 백업 (정시는 cron-job.org)
  workflow_dispatch:
    inputs:
      report:
        description: "보낼 공지"
        required: false
        default: "consult"
        type: choice
        options: [both, consult, waitlist]
      dry_run:
        description: "true면 전송 없이 생성만"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force:
        description: "무조건 발송 (이미 발송됐어도)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      send: ${{ steps.decide.outputs.send }}
    steps:
      - name: 오늘 발송 여부 판단
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          DRYRUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request
          from datetime import datetime, timedelta, timezone

          force = os.environ["FORCE"] == "true"
          dryrun = os.environ["DRYRUN"] == "true"
          out = open(os.environ["GITHUB_OUTPUT"], "a")

          if dryrun or force:
              out.write("send=yes\n")
              print("강제/미리보기 — 발송 진행")
              raise SystemExit(0)

          # 오늘(KST) 이미 성공한 실행이 있으면 스킵
          kst = timezone(timedelta(hours=9))
          midnight = datetime.now(kst).replace(hour=0, minute=0, second=0, microsecond=0)
          since = midnight.astimezone(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          url = (f"https://api.github.com/repos/{os.environ['REPO']}/actions/workflows/"
                 f"consult_report.yml/runs?status=success&created=%3E%3D{since}&per_page=20")
          req = urllib.request.Request(url, headers={
              "Authorization": "Bearer " + os.environ["GH_TOKEN"],
              "Accept": "application/vnd.github+json"})
          runs = json.loads(urllib.request.urlopen(req, timeout=30).read())["workflow_runs"]
          prior = [r for r in runs if str(r["id"]) != os.environ["RUN_ID"]]
          if prior:
              out.write("send=no\n")
              print(f"오늘 이미 발송됨 ({prior[0]['run_started_at']}) — 스킵")
          else:
              out.write("send=yes\n")
              print("오늘 발송 이력 없음 — 발송 진행")
          EOF

  report:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.send == 'yes'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 공지 실행
        env:
          CONSULT_WEBHOOK_URL: ${{ secrets.CONSULT_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # 예약/외부 자동 실행은 상담 미입력만. 수동 실행은 입력값(기본 consult) 따름.
          REPORT="${{ github.event.inputs.report || 'consult' }}"
          FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAG="--dry-run"
          fi
          if [ "$REPORT" != "waitlist" ]; then
            python consult_report.py $FLAG
          fi
          if [ "$REPORT" != "consult" ]; then
            python waitlist_report.py $FLAG
          fi

      - name: 본부 공유 요약페이지 생성 (개인정보 없음)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CONSULT_WEBHOOK_URL: ${{ secrets.CONSULT_WEBHOOK_URL }}
        run: python consult_summary_page.py

      - name: 요약페이지 커밋 (docs/consult_summary.html)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "consult-bot"
          git config user.email "actions@github.com"
          git add docs/consult_summary.html
          if git diff --cached --quiet; then
            echo "요약페이지 변경 없음"
          else
            git commit -m "chore: 상담 현황 요약페이지 자동 갱신 [skip ci]"
            # 지점점검 봇 등과 동시 push 경합 대비 rebase 후 재시도
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} \
                && git push origin HEAD:${{ github.ref_name }} && break
              echo "push 재시도 $i"; sleep 5
            done
          fi

      - name: 실패 알림 (슬랙, 통합 알림 채널)
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d '{"channel":"C0BC37EB38C","text":"⚠️ 상담 공지 발송 실패 — GitHub Actions 로그 확인 필요 (consult_report)"}'
