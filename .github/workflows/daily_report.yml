name: 출석관리

# 자동 발송은 매일 월~토 10:45 KST의 schedule cron 한 곳에서만 나간다.
# cron-job.org의 기존 11:00 호출(workflow_dispatch, 기본 입력)은 아래 게이트에서
# 무조건 스킵된다 — 백업 발송 없음. 수동 실행이 필요하면:
#   - 미리보기: dry_run=true (슬랙 전송 없음)
#   - 실제 발송: force=true

on:
  schedule:
    - cron: '45 1 * * 1-6'  # 월~토 KST 10:45 (UTC 01:45)
  workflow_dispatch:
    inputs:
      dry_run:
        description: '미리보기만 (슬랙 전송 안 함)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: '수동 실제 발송 (이걸 true로 해야만 dispatch로 발송됨)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  report:
    runs-on: ubuntu-latest
    # schedule(10:45)은 항상 실행. workflow_dispatch는 force=true(실제 발송) 또는
    # dry_run=true(미리보기)일 때만 실행 — 기본 입력으로 들어오는 11:00 외부 호출 차단.
    if: github.event_name == 'schedule' || github.event.inputs.force == 'true' || github.event.inputs.dry_run == 'true'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 한글 폰트 설치
        run: sudo apt-get install -y fonts-nanum

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 출석 현황 수집 및 슬랙 전송
        env:
          CAREFOR_ID:       ${{ secrets.CAREFOR_ID }}
          CAREFOR_PW:       ${{ secrets.CAREFOR_PW }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONFIG_YAML:      ${{ secrets.CONFIG_YAML }}
          CI: "true"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python run_headless.py
